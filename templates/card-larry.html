<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1600px; height:1200px; overflow:hidden; }
  body {
    background-color:#EFEFEF;
    background-image:
      linear-gradient(rgba(0,0,0,.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,.05) 1px, transparent 1px);
    background-size:40px 40px;
    font-family:"Helvetica Neue", Helvetica, Arial, sans-serif;
    color:#111; position:relative;
  }
  .fig { position:absolute; top:70px; left:120px; font-family:Menlo, monospace; font-size:24px; letter-spacing:3px; color:rgba(0,0,0,.55); }
  .caption { position:absolute; bottom:70px; left:120px; font-family:Menlo, monospace; font-size:24px; letter-spacing:3px; color:#111; }
  .caption2 { position:absolute; bottom:70px; right:120px; font-family:Menlo, monospace; font-size:24px; letter-spacing:3px; color:#111; font-weight:bold; }

  .lname { font-size:48px; font-weight:bold; margin-top:44px; }
  .ldates { font-family:Menlo, monospace; font-size:24px; color:rgba(0,0,0,.6); margin-top:12px; letter-spacing:2px; }
  .x { position:absolute; right:220px; top:210px; width:560px; text-align:center; }
  .xglyph { font-size:460px; line-height:1.1; font-family:"STIX Two Math","STIXGeneral","Apple Symbols",serif; }
  .xlabel { font-family:Menlo, monospace; font-size:24px; letter-spacing:2px; margin-top:8px; }
  .xsub { font-family:Menlo, monospace; font-size:24px; letter-spacing:2px; color:rgba(0,0,0,.6); margin-top:14px; }
  .arrow { position:absolute; left:620px; top:560px; font-size:80px; color:rgba(0,0,0,.65); }
</style></head><body>
  <div class="fig">FIG. 8 — THE REPLACEMENT</div>

  <div class="larry">
