<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1600px; height:1200px; overflow:hidden; }
  body {
    background-color:#EFEFEF;
    background-image:
      linear-gradient(rgba(0,0,0,.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,.05) 1px, transparent 1px);
    background-size:40px 40px;
    font-family:"Helvetica Neue", Helvetica, Arial, sans-serif;
    color:#111; position:relative;

  .fig { position:absolute; top:70px; left:120px; font-family:Menlo, monospace; font-size:24px; letter-spacing:3px; color:rgba(0,0,0,.55); }
  .caption { position:absolute; bottom:70px; left:120px; font-family:Menlo, monospace; font-size:24px; letter-spacing:3px; color:#111; }
  .caption2 { position:absolute; bottom:70px; right:120px; font-family:Menlo, monospace; font-size:24px; letter-spacing:3px; color:#111; font-weight:bold; }
  .chip { position:absolute; left:490px; top:200px; width:620px; height:780px; background:#fff; border:3px solid #111; padding:40px; }
  .swatch { width:100%; height:500px; background:#4A412A; }
  .chipname { font-size:52px; font-weight:bold; margin-top:44px; letter-spacing:1px; }
  .chipsub { font-family:Menlo, monospace; font-size:24px; letter-spacing:2px; color:rgba(0,0,0,.6); margin-top:16px; }
</style></head><body>

    <g stroke="rgba(0,0,0,.45)" stroke-width="2" fill="none">
      <line x1="430" y1="200" x2="430" y2="980" stroke-dasharray="10 8"/>
      <line x1="415" y1="200" x2="445" y2="200"/>
      <line x1="415" y1="980" x2="445" y2="980"/>
      <line x1="490" y1="1035" x2="1110" y2="1035" stroke-dasharray="10 8"/>
      <line x1="490" y1="1020" x2="490" y2="1050"/>
      <line x1="1110" y1="1020" x2="1110" y2="1050"/>
    </g>
    <text x="1160" y="330" font-family="Menlo" font-size="24" fill="rgba(0,0,0,.6)">ASSOCIATIONS:</text>
    <text x="1160" y="368" font-family="Menlo" font-size="24" fill="rgba(0,0,0,.9)">DIRT</text>

    <text x="1160" y="444" font-family="Menlo" font-size="24" fill="rgba(0,0,0,.9)">DEATH</text>
    <line x1="1140" y1="300" x2="1140" y2="460" stroke="rgba(0,0,0,.45)" stroke-width="2"/>
  </svg>

  <div class="caption">CHOSEN BY 1,000 SMOKERS · 7 STUDIES</div>
