<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1600px; height:1200px; overflow:hidden; }
  body {
    background-color:#EFEFEF;
    background-image:
      linear-gradient(rgba(0,0,0,.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,.05) 1px, transparent 1px);
    background-size:40px 40px;
    font-family:"Helvetica Neue", Helvetica, Arial, sans-serif;
    color:#111; position:relative;

  .ruler { position:absolute; font-family:Menlo, monospace; font-size:24px; color:rgba(0,0,0,.35); }
  .list { position:absolute; left:120px; top:280px; font-family:Menlo, monospace; font-size:46px; letter-spacing:2px; line-height:2.4; }

  .list .no::after { content:"✕"; margin-left:28px; font-size:36px; color:#999; text-decoration:none; display:inline-block; }
  .list .yes { font-weight:bold; }
  .list .yes .box { border:3px solid #111; padding:6px 18px; }
  .footer { position:absolute; bottom:70px; left:120px; font-family:Menlo, monospace; font-size:24px; letter-spacing:3px; color:rgba(0,0,0,.55); }
  .footer2 { position:absolute; bottom:70px; right:120px; font-family:Menlo, monospace; font-size:24px; letter-spacing:3px; color:#111; }
  .fig { position:absolute; top:70px; left:120px; font-family:Menlo, monospace; font-size:24px; letter-spacing:3px; color:rgba(0,0,0,.55); }
  svg { position:absolute; right:80px; top:120px; }
</style></head><body>
